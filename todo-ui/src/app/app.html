<main class="todo-shell">
  <section class="todo-card">
    <h1>Todo App</h1>
    <p class="subtitle">ASP.NET Identity + Angular Frontend</p>

    @if (!isAuthenticated) {
      <section class="auth-panel">
        <div class="auth-tabs">
          <button type="button" [class.active]="authMode === 'login'" (click)="switchMode('login')">Login</button>
          <button type="button" [class.active]="authMode === 'register'" (click)="switchMode('register')">Register</button>
        </div>

        <form class="auth-form" (submit)="$event.preventDefault(); authMode === 'login' ? login() : register()">
          <input type="email" name="email" [(ngModel)]="email" placeholder="Email" required />
          <input type="password" name="password" [(ngModel)]="password" placeholder="Password" required />
          <button type="submit">{{ authMode === 'login' ? 'Login' : 'Create account' }}</button>
        </form>

        @if (authError) {
          <p class="error">{{ authError }}</p>
        }
      </section>
    } @else {
      <div class="toolbar">
        <span class="state">Authenticated</span>
        <button type="button" class="logout" (click)="logout()">Logout</button>
      </div>

      <form class="add-form" (submit)="$event.preventDefault(); addTodo()">
        <input
          type="text"
          name="newTodo"
          [(ngModel)]="newTodoTitle"
          placeholder="Add a task"
          aria-label="New todo title"
        />
        <button type="submit">Add</button>
      </form>

      @if (loading) {
        <p>Loading todos...</p>
      }

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <ul class="todo-list">
        @for (todo of todos; track todo.id) {
          <li>
            <label>
              <input
                type="checkbox"
                [checked]="todo.isDone"
                (change)="toggleTodo(todo)"
              />
              <span [class.done]="todo.isDone">{{ todo.title }}</span>
            </label>
            <button type="button" class="delete" (click)="deleteTodo(todo.id)">
              Delete
            </button>
          </li>
        }
      </ul>
    }
  </section>
</main>
